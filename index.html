        <div class="min-h-screen flex items-center justify-center bg-gray-50">

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { HashRouter, Routes, Route, Link, useParams, useNavigate } = window.ReactRouterDOM;

        // ============================================================
        // FIREBASE CONFIG
        // ============================================================
        const firebaseConfig = {
            apiKey: "AIzaSyB_tiBKyO13wwCYDV4xRo3VnTaQ3K6igM0",
            authDomain: "fir-d36a3.firebaseapp.com",
            projectId: "fir-d36a3",
            storageBucket: "fir-d36a3.firebasestorage.app",
            messagingSenderId: "612214496821",
            appId: "1:612214496821:web:f13328a3ed32df207c5b7c",
            measurementId: "G-1EL9XTXC0C"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        if (firebase.analytics) {
            firebase.analytics();
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Small inline placeholder used when a product/post has no image.
        const PLACEHOLDER_IMAGE = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
                <rect width="600" height="400" fill="#eeeeee"/>
                <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#999999" font-family="Arial" font-size="24">No Image</text>
            </svg>
        `);

        const safeImageUrl = (url) => {
            return typeof url === 'string' && url.trim() ? url.trim() : PLACEHOLDER_IMAGE;
        };

        const normalizeOrderUrl = (url) => {
            const value = typeof url === 'string' ? url.trim() : '';
            if (!value) return '';
            if (/^(https?:\/\/|mailto:|tel:|whatsapp:)/i.test(value)) return value;
            return `https://${value}`;
        };

        const getProductButtonText = (product) => {
            const text = typeof product?.buttonText === 'string' ? product.buttonText.trim() : '';
            return text || 'Order Now';
        };

        const getPostButtonText = (post) => {
            const text = typeof post?.buttonText === 'string' ? post.buttonText.trim() : '';
            return text || 'Read More';
        };

        const formatPrice = (price) => {
            const value = Number(price);
            return Number.isFinite(value) ? value.toLocaleString() : '0';
        };

        const getCreatedAtMillis = (item) => {
            const value = item?.createdAt;
            if (!value) return 0;
            if (typeof value.toMillis === 'function') return value.toMillis();
            if (value.seconds) return value.seconds * 1000;
            const parsed = Date.parse(value);
            return Number.isNaN(parsed) ? 0 : parsed;
        };

        // Firestore has a 1MB document limit. This keeps uploaded images small enough
        // to save and show correctly when stored as a data URL.
        const resizeImageFile = (file, maxWidth = 900, quality = 0.75) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onerror = () => reject(new Error('Failed to read image'));
                reader.onload = () => {
                    const img = new Image();
                    img.onerror = () => reject(new Error('Invalid image file'));
                    img.onload = () => {
                        const scale = Math.min(1, maxWidth / img.width);
                        const canvas = document.createElement('canvas');
                        canvas.width = Math.round(img.width * scale);
                        canvas.height = Math.round(img.height * scale);
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.src = reader.result;
                };
                reader.readAsDataURL(file);
            });
        };

        // ============================================================
        // FIREBASE DATA HELPERS
        // ============================================================

        // Listen to products in real-time
        const listenProducts = (callback) => {
            return db.collection('products')
                .onSnapshot((snapshot) => {
                    const products = [];
                    snapshot.forEach((doc) => {
                        products.push({ id: doc.id, ...doc.data() });
                    });
                    products.sort((a, b) => getCreatedAtMillis(b) - getCreatedAtMillis(a));
                    callback(products);
                }, (error) => {
                    console.error("Firestore products listen error:", error);
                    callback([]);
                });
        };

        // Listen to posts in real-time
        const listenPosts = (callback) => {
            return db.collection('posts')
                .onSnapshot((snapshot) => {
                    const posts = [];
                    snapshot.forEach((doc) => {
                        posts.push({ id: doc.id, ...doc.data() });
                    });
                    posts.sort((a, b) => getCreatedAtMillis(b) - getCreatedAtMillis(a));
                    callback(posts);
                }, (error) => {
                    console.error("Firestore posts listen error:", error);
                    callback([]);
                });
        };

        // Add a product to Firestore
        const addProductToFirestore = async (product) => {
            try {
                const price = Number(product.price);
                if (!Number.isFinite(price)) {
                    throw new Error('Please enter a valid product price.');
                }
                await db.collection('products').add({
                    name: (product.name || '').trim(),
                    description: (product.description || '').trim(),
                    price,
                    category: (product.category || '').trim(),
                    imageUrl: safeImageUrl(product.imageUrl),
                    orderUrl: normalizeOrderUrl(product.orderUrl),
                    buttonText: (product.buttonText || 'Order Now').trim() || 'Order Now',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                return { success: true };
            } catch (error) {
                console.error("Error adding product:", error);
                return { success: false, error: error.message || 'Failed to add product.' };
            }
        };

        // Add a post to Firestore
        const addPostToFirestore = async (post) => {
            try {
                await db.collection('posts').add({
                    title: (post.title || '').trim(),
                    htmlContent: (post.htmlContent || '').trim(),
                    category: (post.category || '').trim(),
                    imageUrl: safeImageUrl(post.imageUrl),
                    buttonUrl: normalizeOrderUrl(post.buttonUrl),
                    buttonText: (post.buttonText || 'Read More').trim() || 'Read More',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                return { success: true };
            } catch (error) {
                console.error("Error adding post:", error);
                return { success: false, error: error.message || 'Failed to add post.' };
            }
        };

        // Update a product in Firestore
        const updateProductInFirestore = async (id, product) => {
            try {
                const price = Number(product.price);
                if (!Number.isFinite(price)) {
                    throw new Error('Please enter a valid product price.');
                }
                await db.collection('products').doc(id).update({
                    name: (product.name || '').trim(),
                    description: (product.description || '').trim(),
                    price,
                    category: (product.category || '').trim(),
                    imageUrl: safeImageUrl(product.imageUrl),
                    orderUrl: normalizeOrderUrl(product.orderUrl),
                    buttonText: (product.buttonText || 'Order Now').trim() || 'Order Now',
                });
                return { success: true };
            } catch (error) {
                console.error("Error updating product:", error);
                return { success: false, error: error.message || 'Failed to update product.' };
            }
        };

        // Update a post in Firestore
        const updatePostInFirestore = async (id, post) => {
            try {
                await db.collection('posts').doc(id).update({
                    title: (post.title || '').trim(),
                    htmlContent: (post.htmlContent || '').trim(),
                    category: (post.category || '').trim(),
                    imageUrl: safeImageUrl(post.imageUrl),
                    buttonUrl: normalizeOrderUrl(post.buttonUrl),
                    buttonText: (post.buttonText || 'Read More').trim() || 'Read More',
                });
                return { success: true };
            } catch (error) {
                console.error("Error updating post:", error);
                return { success: false, error: error.message || 'Failed to update post.' };
            }
        };

        // Delete a product from Firestore
        const deleteProductFromFirestore = async (id) => {
            try {
                await db.collection('products').doc(id).delete();
                return true;
            } catch (error) {
                console.error("Error deleting product:", error);
                return false;
            }
        };

        // Delete a post from Firestore
        const deletePostFromFirestore = async (id) => {
            try {
                await db.collection('posts').doc(id).delete();
                return true;
            } catch (error) {
                console.error("Error deleting post:", error);
                return false;
            }
        };

        // Get a single product by ID
        const getProductByIdFromFirestore = async (id) => {
            try {
                const doc = await db.collection('products').doc(id).get();
                if (doc.exists) {
                    return { id: doc.id, ...doc.data() };
                }
                return null;
            } catch (error) {
                console.error("Error getting product:", error);
                return null;
            }
        };

        // Get a single post by ID
        const getPostByIdFromFirestore = async (id) => {
            try {
                const doc = await db.collection('posts').doc(id).get();
                if (doc.exists) {
                    return { id: doc.id, ...doc.data() };
                }
                return null;
            } catch (error) {
                console.error("Error getting post:", error);
                return null;
            }
        };

        // ============================================================
        // AUTH HELPERS
        // ============================================================
        const loginWithFirebase = async (email, password) => {
            try {
                await auth.signInWithEmailAndPassword(email, password);
                return { success: true };
            } catch (error) {
                return { success: false, error: error.message };
            }
        };

        const logoutFromFirebase = async () => {
            try {
                await auth.signOut();
                return true;
            } catch (error) {
                console.error("Logout error:", error);
                return false;
            }
        };

        // ============================================================
        // COMPONENTS
        // ============================================================

        // Loading Component
        function LoadingSpinner({ message = "Loading..." }) {
            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-50">
                    <div className="text-center">
                        <div className="spinner mx-auto mb-4"></div>
                        <p className="text-gray-600">{message}</p>
                    </div>
                </div>
            );
        }

        // ============================================================
        // AD UNITS
        // ============================================================
        const AD_SCRIPT_URL = "https://hecticwelcomingassociation.com/dd/3e/63/dd3e63cb85c7f37892c476ea203734ac.js";

        function PopunderAdUnits() {
            useEffect(() => {
                const isAdminPage = () => window.location.hash.startsWith('#/admin');
                
                const loadPopunderScripts = (count = 1, reason = 'page') => {
                    if (isAdminPage()) return;
                    for (let i = 0; i < count; i++) {
                        setTimeout(() => {
                            if (isAdminPage()) return;
                            const script = document.createElement('script');
                            script.src = AD_SCRIPT_URL;
                            script.async = true;
                            script.dataset.popunderReason = reason;
                            script.dataset.popunderUnit = String(i + 1);
                            script.referrerPolicy = 'no-referrer-when-downgrade';
                            document.body.appendChild(script);
                        }, i * 900);
                    }
                };

                const runPageAds = () => {
                    if (isAdminPage()) return;
                    const routeKey = `pagePopunderLoaded:${window.location.hash || '#/'}`;
                    if (sessionStorage.getItem(routeKey) === 'true') return;
                    sessionStorage.setItem(routeKey, 'true');
                    loadPopunderScripts(4, 'page-view');
                };

                const runPostClickAd = () => {
                    if (isAdminPage()) return;
                    const now = Date.now();
                    const last = Number(sessionStorage.getItem('lastPostClickPopunder') || '0');
                    if (now - last < 20000) return;
                    sessionStorage.setItem('lastPostClickPopunder', String(now));
                    loadPopunderScripts(2, 'post-click');
                };

                const handleClick = (event) => {
                    const link = event.target.closest && event.target.closest('a');
                    if (!link) return;
                    const href = link.getAttribute('href') || '';
                    const isPostOpen = href.includes('#/posts/') || href.includes('/posts/');
                    const isPostExternalButton = link.dataset.postButton === 'true';
                    if (isPostOpen || isPostExternalButton) {
                        runPostClickAd();
                    }
                };

                runPageAds();
                window.addEventListener('hashchange', runPageAds);
                document.addEventListener('click', handleClick, true);
                
                return () => {
                    window.removeEventListener('hashchange', runPageAds);
                    document.removeEventListener('click', handleClick, true);
                };
            }, []);
            
            return null;
        }

        function PageAdSection() {
            return null;
        }

        // HomePage Component
        function HomePage() {
            const [products, setProducts] = useState([]);
            const [posts, setPosts] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                let productsLoaded = false;
                let postsLoaded = false;

                const unsubProducts = listenProducts((data) => {
                    setProducts(data);
                    productsLoaded = true;
                    if (postsLoaded) setLoading(false);
                });

                const unsubPosts = listenPosts((data) => {
                    setPosts(data);
                    postsLoaded = true;
                    if (productsLoaded) setLoading(false);
                });

                // Fallback timeout in case Firestore is empty or slow
                const timer = setTimeout(() => {
                    setLoading(false);
                }, 3000);

                return () => {
                    unsubProducts();
                    unsubPosts();
                    clearTimeout(timer);
                };
            }, []);

            if (loading) return <LoadingSpinner message="Loading Liger Co..." />;

            return (
                <div className="min-h-screen bg-white">
                    <header className="border-b border-gray-200">
                        <div className="container mx-auto px-4 py-6">
                            <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
                                <Link to="/" className="text-3xl font-bold text-gray-900">
                                    Liger Co
                                </Link>
                                <nav className="flex flex-wrap justify-center gap-3 sm:gap-6 text-sm sm:text-base">
                                    <Link to="/products" className="text-gray-700 hover:text-gray-900">Products</Link>
                                    <Link to="/posts" className="text-gray-700 hover:text-gray-900">Posts</Link>
                                    <Link to="/admin" className="text-gray-700 hover:text-gray-900">Admin</Link>
                                </nav>
                            </div>
                        </div>
                    </header>

                    <PageAdSection />

                    <section className="bg-gray-50 py-14 sm:py-20">
                        <div className="container mx-auto px-4 text-center">
                            <h1 className="text-3xl sm:text-5xl font-bold text-gray-900 mb-4">Welcome to Liger Co</h1>
                            <p className="text-lg sm:text-xl text-gray-600 mb-8">Your Source for Premium Digital Products</p>
                            <div className="flex flex-col sm:flex-row gap-4 justify-center">
                                <Link to="/products" className="bg-gray-900 text-white px-8 py-3 rounded-md hover:bg-gray-800">
                                    Browse Products
                                </Link>
                                <Link to="/posts" className="border border-gray-900 text-gray-900 px-8 py-3 rounded-md hover:bg-gray-100">
                                    Read Posts
                                </Link>
                            </div>
                        </div>
                    </section>

                    <section className="py-16">
                        <div className="container mx-auto px-4">
                            <h2 className="text-3xl font-bold text-gray-900 mb-8">Latest Products</h2>
                            {products.length === 0 ? (
                                <p className="text-gray-600">No products available yet.</p>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {products.slice(0, 6).map((product) => (
                                        <div
                                            key={product.id}
                                            className="border border-gray-200 rounded-lg overflow-hidden hover:shadow-lg transition-shadow bg-white"
                                        >
                                            <Link to={`/products/${product.id}`}>
                                                <img
                                                    src={safeImageUrl(product.imageUrl)}
                                                    alt={product.name}
                                                    className="w-full h-48 object-cover"
                                                    onError={(e) => { e.target.src = PLACEHOLDER_IMAGE; }}
                                                />
                                                <div className="p-4">
                                                    <h3 className="font-bold text-lg mb-2">{product.name}</h3>
                                                    <p className="text-gray-600 text-sm mb-2">{product.description}</p>
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-sm text-gray-500">{product.category}</span>
                                                        <span className="font-bold text-gray-900">LKR {formatPrice(product.price)}</span>
                                                    </div>
                                                </div>
                                            </Link>
                                            <div className="px-4 pb-4">
                                                {product.orderUrl ? (
                                                    <a href={normalizeOrderUrl(product.orderUrl)} target="_blank" rel="noopener noreferrer"
                                                        className="block w-full text-center bg-green-600 text-white py-2 rounded-md hover:bg-green-700">
                                                        {getProductButtonText(product)}
                                                    </a>
                                                ) : (
                                                    <Link to={`/products/${product.id}`} className="block w-full text-center bg-gray-900 text-white py-2 rounded-md hover:bg-gray-800">
                                                        View Details
                                                    </Link>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </section>

                    <section className="py-16 bg-gray-50">
                        <div className="container mx-auto px-4">
                            <h2 className="text-3xl font-bold text-gray-900 mb-8">Latest Posts</h2>
                            {posts.length === 0 ? (
                                <p className="text-gray-600">No posts available yet.</p>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    {posts.slice(0, 6).map((post) => (
                                        <div
                                            key={post.id}
                                            className="bg-white border border-gray-200 rounded-lg overflow-hidden hover:shadow-lg transition-shadow"
                                        >
                                            <Link to={`/posts/${post.id}`}>
                                                <img
                                                    src={safeImageUrl(post.imageUrl)}
                                                    alt={post.title}
                                                    className="w-full h-48 object-cover"
                                                    onError={(e) => { e.target.src = PLACEHOLDER_IMAGE; }}
                                                />
                                                <div className="p-4">
                                                    <h3 className="font-bold text-lg mb-2">{post.title}</h3>
                                                    <span className="text-sm text-gray-500">{post.category}</span>
                                                </div>
                                            </Link>
                                            <div className="px-4 pb-4">
                                                {post.buttonUrl ? (
                                                    <a href={normalizeOrderUrl(post.buttonUrl)} target="_blank" rel="noopener noreferrer" data-post-button="true"
                                                        className="block w-full text-center bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700">
                                                        {getPostButtonText(post)}
                                                    </a>
                                                ) : (
                                                    <Link to={`/posts/${post.id}`} className="block w-full text-center bg-gray-900 text-white py-2 rounded-md hover:bg-gray-800">
                                                        {getPostButtonText(post)}
                                                    </Link>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </section>

                    <footer className="bg-gray-900 text-white py-8">
                        <div className="container mx-auto px-4 text-center">
                            <p>&copy; 2025 Liger Co. All rights reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // AdminLogin Component
        function AdminLogin() {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);
            const navigate = useNavigate();

            useEffect(() => {
                const unsub = auth.onAuthStateChanged((user) => {
                    if (user) {
                        navigate('/admin/dashboard');
                    }
                });
                return unsub;
            }, [navigate]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                
                const result = await loginWithFirebase(username, password);
                setLoading(false);
                
                if (result.success) {
                    navigate('/admin/dashboard');
                } else {
                    if (result.error?.includes('user-not-found') || result.error?.includes('wrong-password')) {
                        setError('Invalid email or password');
                    } else if (result.error?.includes('too-many-requests')) {
                        setError('Too many attempts. Please try again later.');
                    } else {
                        setError(result.error || 'Login failed');
                    }
                }
            };

            return (
                <div className="min-h-screen bg-gray-50 flex items-center justify-center px-4">
                    <div className="max-w-md w-full bg-white rounded-lg shadow-md p-8">
                        <h1 className="text-3xl font-bold text-gray-900 mb-2 text-center">Liger Co</h1>
                        <h2 className="text-xl text-gray-600 mb-8 text-center">Admin Login</h2>
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div>

            useEffect(() => {
                setLoading(true);
                getProductByIdFromFirestore(id).then((data) => {
                    setProduct(data);
                    setLoading(false);

            if (loading) return <LoadingSpinner message="Loading product..." />;

            if (!product) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center">

                            <Link to="/products" className="text-gray-700 hover:text-gray-900 underline">Back to Products</Link>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-white">
                    <header className="border-b border-gray-200">
                        <div className="container mx-auto px-4 py-6">
                            <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
                                <Link to="/" className="text-3xl font-bold text-gray-900">Liger Co</Link>
                                <nav className="flex flex-wrap justify-center gap-3 sm:gap-6 text-sm sm:text-base">
                                    <Link to="/products" className="text-gray-700 hover:text-gray-900">Products</Link>
                                    <Link to="/posts" className="text-gray-700 hover:text-gray-900">Posts</Link>
                                </nav>
                            </div>
                        </div>
                    </header>

                    <PageAdSection />

                    <div className="container mx-auto px-4 py-8 sm:py-12">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                            <div>
                                <img src={safeImageUrl(product.imageUrl)} alt={product.name} className="w-full rounded-lg shadow-lg"
                                    onError={(e) => { e.target.src = PLACEHOLDER_IMAGE; }} />
                            </div>
                            <div>
                                <div className="mb-4">
                                    <span className="bg-gray-100 text-gray-700 px-3 py-1 rounded-full text-sm">{product.category}</span>
                                </div>
                                <h1 className="text-3xl sm:text-4xl font-bold text-gray-900 mb-4">{product.name}</h1>
                                <p className="text-xl text-gray-600 mb-6">{product.description}</p>
                                <div className="bg-gray-50 rounded-lg p-6 mb-6">
                                    <p className="text-sm text-gray-500 mb-2">Price</p>
                                    <p className="text-4xl font-bold text-gray-900">LKR {formatPrice(product.price)}</p>
                                </div>
                                <div className="flex flex-col sm:flex-row gap-4">
                                    {product.orderUrl ? (
                                        <a
                                            href={normalizeOrderUrl(product.orderUrl)}
                                            target="_blank"
                                            rel="noopener noreferrer"
                                            className="flex-1 text-center bg-green-600 text-white px-6 py-3 rounded-md hover:bg-green-700"
                                        >
                                            {getProductButtonText(product)}
                                        </a>
                                    ) : (
                                        <button disabled className="flex-1 bg-gray-400 text-white px-6 py-3 rounded-md cursor-not-allowed">
                                            {getProductButtonText(product)}
                                        </button>
                                    )}
                                    <Link to="/products" className="flex-1 text-center border border-gray-900 text-gray-900 px-6 py-3 rounded-md hover:bg-gray-100">
                                        Back to Products
                                    </Link>
                                </div>
                            </div>
                        </div>
                    </div>

                    <footer className="bg-gray-900 text-white py-8 mt-12">
                        <div className="container mx-auto px-4 text-center">
                            <p>&copy; 2025 Liger Co. All rights reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // PostDetail Component
        function PostDetail() {
            const { id } = useParams();
            const [post, setPost] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                setLoading(true);
                getPostByIdFromFirestore(id).then((data) => {
                    setPost(data);
                    setLoading(false);
                });
            }, [id]);

            if (loading) return <LoadingSpinner message="Loading post..." />;

            if (!post) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center">
                        <div className="text-center">
                            <h1 className="text-3xl font-bold text-gray-900 mb-4">Post Not Found</h1>
                            <Link to="/posts" className="text-gray-700 hover:text-gray-900 underline">Back to Posts</Link>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-white">
                    <header className="border-b border-gray-200">
                        <div className="container mx-auto px-4 py-6">
                            <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
                                <Link to="/" className="text-3xl font-bold text-gray-900">Liger Co</Link>
                                <nav className="flex flex-wrap justify-center gap-3 sm:gap-6 text-sm sm:text-base">
                                    <Link to="/products" className="text-gray-700 hover:text-gray-900">Products</Link>
                                    <Link to="/posts" className="text-gray-700 hover:text-gray-900">Posts</Link>
                                </nav>
                            </div>
                        </div>
                    </header>

                    <PageAdSection />

                    <div className="container mx-auto px-4 py-8 sm:py-12 max-w-4xl">
                        <div className="mb-6">
                            <span className="bg-gray-100 text-gray-700 px-3 py-1 rounded-full text-sm">{post.category}</span>
                        </div>
                        <h1 className="text-3xl sm:text-4xl font-bold text-gray-900 mb-6">{post.title}</h1>
                        <img src={safeImageUrl(post.imageUrl)} alt={post.title} className="w-full rounded-lg shadow-lg mb-8"
                            onError={(e) => { e.target.src = PLACEHOLDER_IMAGE; }} />
                        <div className="prose prose-lg max-w-none" dangerouslySetInnerHTML={{ __html: post.htmlContent }} />
                        <div className="mt-8">
                            {post.buttonUrl ? (
                                <a
                                    href={normalizeOrderUrl(post.buttonUrl)}
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    data-post-button="true"
                                    className="inline-block w-full sm:w-auto text-center bg-blue-600 text-white px-8 py-3 rounded-md hover:bg-blue-700 font-medium"
                                >
                                    {getPostButtonText(post)}
                                </a>
                            ) : (
                                <span className="inline-block text-sm text-gray-500">No external link added for this post.</span>
                            )}
                        </div>
                        <div className="mt-12 pt-6 border-t border-gray-200">
                            <Link to="/posts" className="text-gray-700 hover:text-gray-900">← Back to All Posts</Link>
                        </div>
                    </div>

                    <footer className="bg-gray-900 text-white py-8 mt-12">
                        <div className="container mx-auto px-4 text-center">
                            <p>&copy; 2025 Liger Co. All rights reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // AllProducts Component
        function AllProducts() {
            const [products, setProducts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedCategory, setSelectedCategory] = useState('All');

            useEffect(() => {
                const unsub = listenProducts((data) => {
                    setProducts(data);
                    setLoading(false);
                });
                return unsub;
            }, []);

            const categories = ['All', ...new Set(products.map(p => p.category).filter(Boolean))];
            const filteredProducts = selectedCategory === 'All'
                ? products
                : products.filter(p => p.category === selectedCategory);

            if (loading) return <LoadingSpinner message="Loading products..." />;

            return (
                <div className="min-h-screen bg-white">
                    <header className="border-b border-gray-200">
                        <div className="container mx-auto px-4 py-6">
                            <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
                                <Link to="/" className="text-3xl font-bold text-gray-900">Liger Co</Link>
                                <nav className="flex flex-wrap justify-center gap-3 sm:gap-6 text-sm sm:text-base">
                                    <Link to="/products" className="text-gray-700 hover:text-gray-900">Products</Link>
                                    <Link to="/posts" className="text-gray-700 hover:text-gray-900">Posts</Link>
                                    <Link to="/admin" className="text-gray-700 hover:text-gray-900">Admin</Link>
                                </nav>
                            </div>
                        </div>
                    </header>

                    <PageAdSection />

                    <div className="container mx-auto px-4 py-8 sm:py-12">
                        <h1 className="text-3xl sm:text-4xl font-bold text-gray-900 mb-8">All Products</h1>
                        <div className="mb-8 flex gap-2 flex-wrap">
                            {categories.map((category) => (
                                <button key={category} onClick={() => setSelectedCategory(category)}
                                    className={`px-4 py-2 rounded-full transition-colors ${
                                        selectedCategory === category
                                            ? 'bg-gray-900 text-white'
                                            : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                    }`}>
                                    {category}
                                </button>
                            ))}
                        </div>
                        {filteredProducts.length === 0 ? (
                            <p className="text-gray-600">No products available.</p>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
                                {filteredProducts.map((product) => (
                                    <div key={product.id}
                                        className="border border-gray-200 rounded-lg overflow-hidden hover:shadow-lg transition-shadow bg-white">
                                        <Link to={`/products/${product.id}`}>
                                            <img src={safeImageUrl(product.imageUrl)} alt={product.name} className="w-full h-48 object-cover"
                                                onError={(e) => { e.target.src = PLACEHOLDER_IMAGE; }} />
                                            <div className="p-4">
                                                <h3 className="font-bold text-lg mb-2">{product.name}</h3>
                                                <p className="text-gray-600 text-sm mb-2 line-clamp-2">{product.description}</p>
                                                <div className="flex justify-between items-center">
                                                    <span className="text-sm text-gray-500">{product.category}</span>
                                                    <span className="font-bold text-gray-900">LKR {formatPrice(product.price)}</span>
                                                </div>
                                            </div>
                                        </Link>
                                        <div className="px-4 pb-4">
                                            {product.orderUrl ? (
                                                <a href={normalizeOrderUrl(product.orderUrl)} target="_blank" rel="noopener noreferrer"
                                                    className="block w-full text-center bg-green-600 text-white py-2 rounded-md hover:bg-green-700">
                                                    {getProductButtonText(product)}
                                                </a>
                                            ) : (
                                                <Link to={`/products/${product.id}`} className="block w-full text-center bg-gray-900 text-white py-2 rounded-md hover:bg-gray-800">
                                                    View Details
                                                </Link>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <footer className="bg-gray-900 text-white py-8 mt-12">
                        <div className="container mx-auto px-4 text-center">
                            <p>&copy; 2025 Liger Co. All rights reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // AllPosts Component
        function AllPosts() {
            const [posts, setPosts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedCategory, setSelectedCategory] = useState('All');

            useEffect(() => {
                const unsub = listenPosts((data) => {
                    setPosts(data);
                    setLoading(false);
                });
                return unsub;
            }, []);

            const categories = ['All', ...new Set(posts.map(p => p.category).filter(Boolean))];
            const filteredPosts = selectedCategory === 'All'
                ? posts
                : posts.filter(p => p.category === selectedCategory);

            if (loading) return <LoadingSpinner message="Loading posts..." />;

            return (
                <div className="min-h-screen bg-white">
                    <header className="border-b border-gray-200">
                        <div className="container mx-auto px-4 py-6">
                            <div className="flex flex-col sm:flex-row items-center justify-between gap-4">
                                <Link to="/" className="text-3xl font-bold text-gray-900">Liger Co</Link>
                                <nav className="flex flex-wrap justify-center gap-3 sm:gap-6 text-sm sm:text-base">
                                    <Link to="/products" className="text-gray-700 hover:text-gray-900">Products</Link>
                                    <Link to="/posts" className="text-gray-700 hover:text-gray-900">Posts</Link>
                                    <Link to="/admin" className="text-gray-700 hover:text-gray-900">Admin</Link>
                                </nav>
                            </div>
                        </div>
                    </header>

                    <PageAdSection />

                    <div className="container mx-auto px-4 py-8 sm:py-12">
                        <h1 className="text-3xl sm:text-4xl font-bold text-gray-900 mb-8">All Posts</h1>
                        <div className="mb-8 flex gap-2 flex-wrap">
                            {categories.map((category) => (
                                <button key={category} onClick={() => setSelectedCategory(category)}
                                    className={`px-4 py-2 rounded-full transition-colors ${
                                        selectedCategory === category
                                            ? 'bg-gray-900 text-white'
                                            : 'bg-gray-100 text-gray-700 hover:bg-gray-200'
                                    }`}>
                                    {category}
                                </button>
                            ))}
                        </div>
                        {filteredPosts.length === 0 ? (
                            <p className="text-gray-600">No posts available.</p>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {filteredPosts.map((post) => (
                                    <div key={post.id}
                                        className="bg-white border border-gray-200 rounded-lg overflow-hidden hover:shadow-lg transition-shadow">
                                        <Link to={`/posts/${post.id}`}>
                                            <img src={safeImageUrl(post.imageUrl)} alt={post.title} className="w-full h-48 object-cover"
                                                onError={(e) => { e.target.src = PLACEHOLDER_IMAGE; }} />
                                            <div className="p-4">
                                                <h3 className="font-bold text-lg mb-2">{post.title}</h3>
                                                <span className="text-sm text-gray-500">{post.category}</span>
                                            </div>
                                        </Link>
                                        <div className="px-4 pb-4">
                                            {post.buttonUrl ? (
                                                <a href={normalizeOrderUrl(post.buttonUrl)} target="_blank" rel="noopener noreferrer" data-post-button="true"
                                                    className="block w-full text-center bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700">
                                                    {getPostButtonText(post)}
                                                </a>
                                            ) : (
                                                <Link to={`/posts/${post.id}`} className="block w-full text-center bg-gray-900 text-white py-2 rounded-md hover:bg-gray-800">
                                                    {getPostButtonText(post)}
                                                </Link>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <footer className="bg-gray-900 text-white py-8 mt-12">
                        <div className="container mx-auto px-4 text-center">
                            <p>&copy; 2025 Liger Co. All rights reserved.</p>
                        </div>
                    </footer>
                </div>
            );
        }

        // Main App Component
        function App() {
            return (
                <>
                    <PopunderAdUnits />
                    <HashRouter>
                        <Routes>
                            <Route path="/" element={<HomePage />} />
                            <Route path="/admin" element={<AdminLogin />} />
                            <Route path="/admin/dashboard" element={<AdminDashboard />} />
                            <Route path="/products" element={<AllProducts />} />
                            <Route path="/products/:id" element={<ProductDetail />} />
                            <Route path="/posts" element={<AllPosts />} />
                            <Route path="/posts/:id" element={<PostDetail />} />
                        </Routes>
                    </HashRouter>
                </>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
